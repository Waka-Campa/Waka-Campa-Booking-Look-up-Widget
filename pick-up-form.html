<!-- OUTER WRAPPER -->
<div style="
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f5f5;
  padding:15px;
">

<!-- MAIN CONTAINER -->
<div style="width:100%;max-width:500px;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;"> 

  <div style="text-align:center;margin-bottom:30px;"> 
    <h2 style="margin:0 0 10px 0;font-size:18px;"><strong>Pick-up Form</strong></h2> 
    <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>
  </div> 

  <div id="form-section"> 
    <div style="margin-bottom:20px;"> 
      <p style="margin-bottom:15px;font-size:16px;text-align:center;"><strong>Please enter reservation details</strong></p> 
      <label style="display:block;margin-bottom:5px;">Booking Number</label> 
      <input id="booking-input" type="text" placeholder="e.g. 4020" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;font-size:16px;"> 
    </div> 

    <div style="margin-bottom:25px;"> 
      <label style="display:block;margin-bottom:5px;">Last Name</label> 
      <input id="lastname-input" type="text" placeholder="e.g. Lucero" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;font-size:16px;"> 
    </div> 

    <button id="verify-btn" type="button" style="width:100%;padding:15px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:2px solid #fff;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;">Submit</button> 
  </div> 

  <div id="loading" style="display:none;padding:20px;text-align:center;">🔍 Searching Reservation....</div> 
  <div id="booking-details" style="display:none;"></div> 
  <div id="confirmation-buttons" style="display:none;padding:20px;text-align:center;"></div>
  <div id="survey-iframe" style="display:none;width:100%;"></div>
  <div id="error" style="display:none;color:#ef4444;text-align:center;padding:20px;"></div> 

</div>
</div>

<script> 
let currentBookingNum = '';
let currentLastName = '';

document.getElementById('verify-btn').onclick = async function(e) { 
  e.preventDefault(); 
  currentBookingNum = document.getElementById('booking-input').value.trim(); 
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase(); 
  
  if (!currentBookingNum || !currentLastName) { 
    document.getElementById('error').innerHTML = 'Please enter both fields'; 
    document.getElementById('error').style.display = 'block'; 
    return; 
  } 

  document.getElementById('form-section').style.display = 'none'; 
  document.getElementById('loading').style.display = 'block'; 

  try { 
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/PWGPbbTKKaJUE470aVwLy/sync', { 
      method: 'POST', 
      headers: {'Content-Type': 'application/json'}, 
      body: JSON.stringify({bookingNum: currentBookingNum, lastName: currentLastName}) 
    }); 

    let result = response.status === 204 
      ? { success: false } 
      : await response.json(); 

    if (result.success && result.data) { 
      document.getElementById('loading').style.display = 'none'; 
      document.getElementById('booking-details').style.display = 'block'; 

      document.getElementById('booking-details').innerHTML = `
        <div style="padding:20px;text-align:center;">
          <h3>Booking # ${result.data.bookingNum}</h3>
          <p>Please confirm your details</p>
        </div>
      `;

      document.getElementById('confirmation-buttons').style.display = 'block';
      document.getElementById('confirmation-buttons').innerHTML = `
        <button onclick="handleDetailsCorrect()" style="width:48%;padding:12px;background:#16a34a;color:#fff;border-radius:8px;margin-right:4%;">✓ Correct</button>
        <button onclick="resetForm()" style="width:48%;padding:12px;background:#dc2626;color:#fff;border-radius:8px;">✗ Incorrect</button>
      `;

    } else { 
      throw new Error();
    }

  } catch(error) { 
    document.getElementById('loading').style.display = 'none'; 
    document.getElementById('error').style.display = 'block'; 
    document.getElementById('error').innerHTML = '❌ Booking not found / error'; 
  } 
}; 

function handleDetailsCorrect() {
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';

  const container = document.getElementById('survey-iframe');

  container.innerHTML = `
    <iframe 
      src="https://api.leadconnectorhq.com/widget/survey/HRnCawqi4cNodd48rYv0?booking_number=${encodeURIComponent(currentBookingNum)}&last_name=${encodeURIComponent(currentLastName)}"
      style="border:none;width:100%;height:${window.innerWidth < 600 ? '80vh' : '600px'};"
      scrolling="no"
      id="surveyFrame"
      title="survey">
    </iframe>
  `;

  container.style.display = 'block';

  if (!document.querySelector('script[src="https://link.msgsndr.com/js/form_embed.js"]')) {
    const script = document.createElement('script');
    script.src = 'https://link.msgsndr.com/js/form_embed.js';
    document.body.appendChild(script);
  }

  // Detect submission
  let checkCount = 0;
  const interval = setInterval(() => {
    const iframe = document.getElementById('surveyFrame');

    if (!iframe) return;

    try {
      const url = iframe.contentWindow.location.href;
      if (url.includes('thank') || url.includes('success')) {
        clearInterval(interval);
        showThankYouScreen();
      }
    } catch (e) {}

    checkCount++;
    if (checkCount > 120) clearInterval(interval);
  }, 1000);

  document.getElementById('surveyFrame').addEventListener('load', () => {
    if (checkCount > 3) {
      showThankYouScreen();
    }
  });
}

function showThankYouScreen() {
  const container = document.getElementById('survey-iframe');

  let countdown = 3;

  container.innerHTML = `
    <div style="text-align:center;padding:40px;">
      <h2>✅ Submission Successful</h2>
      <p>Thank you! You're all set.</p>
      <p style="font-size:14px;color:#555;">Redirecting in <span id="countdown">${countdown}</span>...</p>
    </div>
  `;

  const interval = setInterval(() => {
    countdown--;
    document.getElementById('countdown').innerText = countdown;

    if (countdown <= 0) {
      clearInterval(interval);
      resetForm();
    }
  }, 1000);
}

function resetForm() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';
  document.getElementById('survey-iframe').style.display = 'none';
  document.getElementById('loading').style.display = 'none';

  document.getElementById('booking-input').value = '';
  document.getElementById('lastname-input').value = '';

  currentBookingNum = '';
  currentLastName = '';
}
</script> 

<style> 
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap'); 

@media (max-width: 600px) {
  input {
    font-size:18px !important;
    padding:14px !important;
  }

  button {
    font-size:16px !important;
    padding:14px !important;
  }

  h2 {
    font-size:20px !important;
  }
}
</style>
