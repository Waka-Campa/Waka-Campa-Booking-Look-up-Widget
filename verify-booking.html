<script>
document.getElementById('verify-btn').onclick = async function(e) {
  e.preventDefault();

  const bookingNum = document.getElementById('booking-input').value.trim();
  const lastName = document.getElementById('lastname-input').value.trim();

  if (!bookingNum || !lastName) {
    document.getElementById('error').innerHTML = 'Please enter both fields';
    document.getElementById('error').style.display = 'block';
    document.getElementById('form-section').style.display = 'block';
    return;
  }

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/PWGPbbTKKaJUE470aVwLy', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ bookingNum, lastName })
    });

    const result = await response.json();

    console.log('Webhook result:', result);

    if (result && typeof result === 'object' && result.success === true && result.data != null) {
      const data = result.data;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('booking-details').style.display = 'block';
      document.getElementById('booking-details').innerHTML = `
        <div style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;border-radius:20px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);">
          <h2 style="margin:0 0 20px 0;">✅ Booking Verified!</h2>
          <div style="background:rgba(255,255,255,0.15);padding:25px;border-radius:15px;">
            <h3 style="margin:0 0 15px 0;">#${data.bookingNum || bookingNum} - ${data.lastName || lastName}</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;font-size:14px;">
              <div><strong>Reference:</strong> ${data.reservationRef || 'N/A'}</div>
              <div><strong>Status:</strong> ${data.reservationStatus || 'Active'}</div>
              <div><strong>Balance Due:</strong> ${data.totalBalanceDue || 'N/A'}</div>
              <div><strong>Total:</strong> ${data.totalAmount || 'N/A'}</div>
              <div><strong>Pickup:</strong> ${data.pickupDate || 'N/A'}</div>
              <div><strong>Location:</strong> ${data.pickupLocation || 'N/A'}</div>
            </div>
          </div>
          <label style="display:block;margin-top:20px;color:white;">
            <input type="checkbox" id="confirmDetails">
            I confirm these details are correct
          </label>
          <button onclick="window.parent.postMessage({type:'booking-verified',verified:true,ref:'${data.reservationRef || 'N/A'}'},'*');window.location.href='#next-slide';" 
                  style="margin-top:15px;padding:12px 30px;background:rgba(255,255,255,0.3);color:white;border:2px solid white;border-radius:10px;font-size:16px;cursor:pointer;">
            Continue Survey →
          </button>
        </div>
      `;
    } else {
      // booking not found / invalid
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').innerHTML = `
        <div style="font-size:18px;">
          ❌ ${result?.message || 'Booking not found'}
          <br><small>Contact <a href="mailto:support@wakacampa.com" style="color:#ef4444;text-decoration:underline;">support@wakacampa.com</a> if correct</small>
        </div>
        <button onclick="window.parent.postMessage({type:'booking-verified',verified:false},'*');document.getElementById('form-section').style.display='block';document.getElementById('error').style.display='none';" style="margin-top:15px;padding:10px 20px;background:#6b7280;color:white;border:none;border-radius:6px;">
          Try Again
        </button>
      `;
      window.parent.postMessage({type: 'booking-verified', verified: false}, '*');
      document.getElementById('error').style.display = 'block';
    }
  } catch(error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').innerHTML = `
      <div style="font-size:18px;">
        ❌ Connection error - try again
        <br><small>Or contact support</small>
      </div>
      <button onclick="document.getElementById('form-section').style.display='block';document.getElementById('error').style.display='none';" style="margin-top:15px;padding:10px 20px;background:#6b7280;color:white;border:none;border-radius:6px;">
        Try Again
      </button>
    `;
    window.parent.postMessage({type: 'booking-verified', verified: false, error: true}, '*');
    document.getElementById('error').style.display = 'block';
    console.error('Webhook error:', error);
  }
};
</script>
